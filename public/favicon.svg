<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E83E8C" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E83E8C"/>
      <stop offset="100%" stop-color="#A78BD4"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#09090b"/>
  <!-- Glow -->
  <circle cx="32" cy="32" r="28" fill="url(#glow)"/>
  <!-- Brain path (simplified neural/brain shape) -->
  <g transform="translate(10, 12)">
    <!-- Left hemisphere -->
    <path d="M22 8 C16 8 10 12 10 18 C10 22 12 25 14 27 C12 29 11 32 13 35 C15 38 19 38 21 36 C21 38 22 40 24 40 L24 8 Z" 
          fill="url(#brain)" opacity="0.9"/>
    <!-- Right hemisphere -->
    <path d="M24 8 C30 8 36 12 36 18 C36 22 34 25 32 27 C34 29 35 32 33 35 C31 38 27 38 25 36 C25 38 24 40 24 40 L24 8 Z" 
          fill="url(#brain)" opacity="0.9"/>
    <!-- Center line -->
    <line x1="24" y1="10" x2="24" y2="39" stroke="#09090b" stroke-width="1.5"/>
    <!-- Neural dots -->
    <circle cx="17" cy="20" r="2" fill="#fff" opacity="0.6"/>
    <circle cx="31" cy="20" r="2" fill="#fff" opacity="0.6"/>
    <circle cx="15" cy="30" r="1.5" fill="#fff" opacity="0.5"/>
    <circle cx="33" cy="30" r="1.5" fill="#fff" opacity="0.5"/>
  </g>
</svg>
